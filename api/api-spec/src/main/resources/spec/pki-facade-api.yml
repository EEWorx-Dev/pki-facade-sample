openapi: 3.1.0
info:
  title: Certificate Lifecycle Management API (Poor Man's PKI)
  description: |
    RESTful API for managing the full lifecycle of certificates in a lightweight PKI-like system.

    ## Certificate Lifecycle Rules Summary

    **Purposes** — Only `identity`, `encryption`, `signing` are supported.  
    • `identity`: one certificate per device (gateway/server); TLS client/server distinction lives **only** in KeyUsage/ExtendedKeyUsage fields.  
    • `encryption`: multiple allowed, distinguished by key hierarchy (e.g. BAA, RTG, Provider, Crypto).  
    • `signing`: typically one per recipient.

    **Statuses** — pending → active (explicit PATCH only) → expired (automatic) / revoked (explicit DELETE).

    **Creation & Renewal**  
    • New certificates (provision, CSR, device registration) are issued directly as **active**.  
    • Renewals create a new version in **pending** status (old version remains active until the new one is explicitly activated).  
    • **409 Conflict** returned if a pending renewal version already exists for the same recipient + purpose.

    **Activation** — Only `pending` → `active` via PATCH is supported.

    **Revocation** — DELETE marks as `revoked`; optional reason in body.

    **Retrieval**  
    • Telescopic: basic info → /details (parsed fields + issuerChain) → /content (PEM + optional trustChainPem).  
    • `?fetchContent=true` is a **convenience parameter intended for single-certificate endpoints** (by certId, device sub-resources, /encryption/{key}).  
      It is ignored (or may return 400 in strict mode) on list-style endpoints that can return multiple records.  
    • Content control:  
      - `?includePublic=true/false` (default true)  
      - `?includePrivate=true/false` (default false)  
      - `?includeChain=true/false` (default true) — when false, `trustChainPem` field is omitted from content responses

    **Device Projections**  
    • Gateways support `/identity`, `/signing` (404 if none), `/encryption` (404 if none), and `/bundle` (full content package with mandatory trustChainPem for identity).  
    • Servers only have identity certificate.

    **Security**  
    All operations require **both** `X-API-Key` and client certificate headers (`X-Client-Cert-CN` + `X-Client-Cert-DN`) forwarded by reverse proxy.

    **Errors** — Standardized as `application/problem+json` (RFC 9457): 400, 401, 404, 409 (pending conflict).

  version: 2.0.0
  contact:
    name: Elisha Ebenezer

servers:
  - url: https://api.pki.learning.eeworx.dev/
    description: Production
  - url: https://api-dev.pki.learning.eeworx.dev/
    description: Development / staging


tags:
  - name: Certificates
    description: Core certificate operations
  - name: Devices
    description: Gateway & server projections + bundle
  - name: Encryption
    description: Encryption certificate hierarchy lookup
  - name: EST
    description: Enrollment over Secure Transport (RFC 7030)

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication and authorization
    ClientCertCN:
      type: apiKey
      in: header
      name: X-Client-Cert-CN
      description: Forwarded Common Name from client certificate (mTLS terminated at proxy)
    ClientCertDN:
      type: apiKey
      in: header
      name: X-Client-Cert-DN
      description: Forwarded Distinguished Name from client certificate (mTLS terminated at proxy)

  schemas:
    PemComponent:
      type: object
      properties:
        content:
          type: string
          description: PEM-encoded content
        checksum:
          type: string
          description: SHA-256 hex checksum of the decoded content
      required: [content, checksum]

    Validity:
      type: object
      properties:
        from:
          type: string
          format: date-time
        till:
          type: string
          format: date-time
      required: [from, till]

    Recipient:
      type: object
      properties:
        type:
          type: string
          enum: [gateway, server, provider, encryptor]
        idType:
          type: string
          enum: [serial, hostname, orgId, name]
        id:
          type: string
      required: [type, idType, id]

    CertificateBasic:
      type: object
      properties:
        certId:
          type: string
          description: Serial Number (SN)
        cn:
          type: string
        dn:
          type: string
        validity:
          $ref: '#/components/schemas/Validity'
        version:
          type: integer
        purpose:
          type: string
          enum: [identity, encryption, signing]
        status:
          type: string
          enum: [active, expired, pending, revoked]
        recipient:
          $ref: '#/components/schemas/Recipient'
      required:
        - certId
        - cn
        - dn
        - validity
        - version
        - purpose
        - status
        - recipient

    CertificateDetails:
      allOf:
        - $ref: '#/components/schemas/CertificateBasic'
      type: object
      properties:
        subject:
          type: object
          properties:
            commonName:
              type: string
            organization:
              type: string
            organizationalUnit:
              type: string
            country:
              type: string
            state:
              type: string
            locality:
              type: string
          additionalProperties: true
        issuer:
          type: object
          properties:
            commonName:
              type: string
            organization:
              type: string
            organizationalUnit:
              type: string
            country:
              type: string
            state:
              type: string
            locality:
              type: string
          additionalProperties: true
        keyUsage:
          type: array
          items:
            type: string
        extendedKeyUsage:
          type: array
          items:
            type: string
        publicKeyAlgorithm:
          type: string
        signatureAlgorithm:
          type: string
        issuerChain:
          type: array
          items:
            type: object
            properties:
              commonName:
                type: string
              dn:
                type: string
            required: [dn]
          description: Structured issuer hierarchy from immediate issuer to root

    CertificateContent:
      type: object
      properties:
        certPem:
          $ref: '#/components/schemas/PemComponent'
        privatePem:
          $ref: '#/components/schemas/PemComponent'
        trustChainPem:
          type: array
          items:
            $ref: '#/components/schemas/PemComponent'
          description: PEM-encoded trust chain (intermediates + root) with checksums. Omitted when includeChain=false.

    GatewayCertBundle:
      type: object
      properties:
        identity:
          type: object
          properties:
            certPem:
              $ref: '#/components/schemas/PemComponent'
            privatePem:
              $ref: '#/components/schemas/PemComponent'
            trustChainPem:
              type: array
              items:
                $ref: '#/components/schemas/PemComponent'
              description: PEM-encoded trust chain for the identity certificate (mandatory)
          required: [certPem, privatePem, trustChainPem]
        signing:
          type: object
          properties:
            privatePem:
              $ref: '#/components/schemas/PemComponent'
          required: [privatePem]
        encryption:
          type: array
          items:
            type: object
            properties:
              keyId:
                type: string
              certPem:
                $ref: '#/components/schemas/PemComponent'
              privatePem:
                $ref: '#/components/schemas/PemComponent'
            required: [keyId, certPem, privatePem]

    CertificateProvisionRequest:
      type: object
      properties:
        purpose:
          type: string
          enum: [identity, encryption, signing]
        recipient:
          $ref: '#/components/schemas/Recipient'
        validityDays:
          type: integer
          default: 365
      required: [purpose, recipient]

    GatewayRegistrationRequest:
      type: object
      properties:
        serialNo:
          type: string
        orgId:
          type: string
      required: [serialNo]

    ServerRegistrationRequest:
      type: object
      properties:
        hostname:
          type: string
        orgId:
          type: string
      required: [hostname]

    StatusUpdateRequest:
      type: object
      properties:
        status:
          type: string
          enum: [active]
      required: [status]

    RevocationRequest:
      type: object
      properties:
        reason:
          type: string

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
      required: [title, status, detail]

  examples:
    emptyCertificateList:
      summary: No matching certificates
      value: []
    certificateBasicExample:
      summary: Single certificate
      value:
        certId: "1234567890abcdef"
        cn: "gw-001.example.com"
        dn: "CN=gw-001.example.com,O=ExampleOrg"
        validity:
          from: "2025-02-01T00:00:00Z"
          till: "2026-02-01T00:00:00Z"
        version: 1
        purpose: identity
        status: active
        recipient:
          type: gateway
          idType: serial
          id: "gw-001"
    problemBadRequest:
      summary: Bad Request
      value:
        title: Bad Request
        status: 400
        detail: "Invalid request body"
    problemUnauthorized:
      summary: Unauthorized
      value:
        title: Unauthorized
        status: 401
        detail: "Missing or invalid authentication headers"
    problemNotFound:
      summary: Not Found
      value:
        title: Not Found
        status: 404
        detail: "Resource not found"
    problemConflict:
      summary: Conflict
      value:
        title: Conflict
        status: 409
        detail: "A pending certificate already exists for this recipient and purpose"

  parameters:
    CertIdParam:
      name: certId
      in: path
      required: true
      schema:
        type: string
      description: Certificate Serial Number (SN)
    GwSerialParam:
      name: gw-serial
      in: path
      required: true
      schema:
        type: string
      description: Gateway serial number
    HostnameParam:
      name: hostname
      in: path
      required: true
      schema:
        type: string
      description: Server hostname
    FetchContentParam:
      name: fetchContent
      in: query
      schema:
        type: boolean
        default: false
      description: Include PEM content in the response (intended for single-record endpoints)
    IncludePublicParam:
      name: includePublic
      in: query
      schema:
        type: boolean
        default: true
      description: Include public certificate PEM (default true; false omits certPem)
    IncludePrivateParam:
      name: includePrivate
      in: query
      schema:
        type: boolean
        default: false
      description: Include private key PEM (default false; false omits privatePem)
    IncludeChainParam:
      name: includeChain
      in: query
      schema:
        type: boolean
        default: true
      description: Include trust chain PEM (default true; false omits trustChainPem field)
    FormatParam:
      name: format
      in: query
      schema:
        type: string
        enum: [json, xml, zip]
        default: json
      description: Bundle format (json default)

  responses:
    Unauthorized:
      description: Authentication failed (missing or invalid API key or client certificate headers)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          examples:
            default:
              $ref: '#/components/examples/problemUnauthorized'
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          examples:
            default:
              $ref: '#/components/examples/problemNotFound'
    BadRequest:
      description: Invalid request (validation error, malformed body, etc.)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          examples:
            default:
              $ref: '#/components/examples/problemBadRequest'
    Conflict:
      description: Conflict (e.g. pending certificate exists)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          examples:
            default:
              $ref: '#/components/examples/problemConflict'

security:
  - ApiKeyAuth: []
    ClientCertCN: []
    ClientCertDN: []

paths:
  /v2/certificates:
    get:
      tags: [Certificates]
      operationId: listCertificates
      summary: Search certificates (basic info, one row per version)
      description: |
        Returns basic info for certificates matching the query filters.  
        Intended for targeted lookups (all certs for a device, provider, server).  
        Returns **200 OK with empty array []** when no certificates match.
      parameters:
        - name: for
          in: query
          schema:
            type: string
            enum: [gateway, server, provider, master]
          description: Recipient type filter
        - name: id
          in: query
          schema:
            type: string
          description: Recipient ID
        - name: idtype
          in: query
          schema:
            type: string
            enum: [sn, name, serial, hostname, orgId]
          description: ID type
        - name: purpose
          in: query
          schema:
            type: string
            enum: [identity, encryption, signing]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, expired, pending, revoked]
        - name: dn
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
          description: |
            Sort by field(s). Prefix '-' for descending. Examples: validity.from, -version, status,cn
      responses:
        '200':
          description: List of basic certificate records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CertificateBasic'
              examples:
                empty:
                  $ref: '#/components/examples/emptyCertificateList'
                withResults:
                  $ref: '#/components/examples/certificateBasicExample'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Certificates]
      operationId: provisionCertificate
      summary: Provision a new certificate
      description: |
        Provisions a new certificate, issued directly in **active** status.  
        Returns 409 if a pending renewal already exists for this recipient + purpose.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificateProvisionRequest'
      responses:
        '201':
          description: Certificate provisioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateBasic'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /v2/certificates/from-csr:
    post:
      tags: [Certificates]
      operationId: signCsr
      summary: Sign a Certificate Signing Request (CSR)
      description: |
        Accepts a PEM-encoded CSR and issues a signed certificate.  
        The subject (CN/DN) is taken from the CSR and used as the primary identifier.  
        - If an active certificate already exists for the same CN/DN → treated as renewal → new version created in **pending** status.  
        - If no existing certificate → issued directly in **active** status.  
        - Returns **409 Conflict** if a pending version already exists for this CN/DN.  
        Optional recipientType/recipientId can be supplied for validation/context (must match CSR subject if provided).  
        Backend may override/validate fields (expiry, SANs, etc.).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                csrPem:
                  type: string
                  description: PEM-encoded CSR
                purpose:
                  type: string
                  enum: [identity, encryption, signing]
                recipient:
                  $ref: '#/components/schemas/Recipient'
                validityDays:
                  type: integer
                  default: 365
              required: [csrPem, purpose]
      responses:
        '201':
          description: Certificate signed (active if new, pending if renewal)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateBasic'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /v2/certificates/{certId}:
    parameters:
      - $ref: '#/components/parameters/CertIdParam'
    get:
      tags: [Certificates]
      operationId: getCertificate
      summary: Get Basic Cert Info
      description: |
        Basic certificate information.  
        ?fetchContent=true embeds content (cert, optional private/chain per include params).
      parameters:
        - $ref: '#/components/parameters/FetchContentParam'
        - $ref: '#/components/parameters/IncludePublicParam'
        - $ref: '#/components/parameters/IncludePrivateParam'
        - $ref: '#/components/parameters/IncludeChainParam'
      responses:
        '200':
          description: Basic certificate information
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CertificateBasic'
                  - type: object
                    properties:
                      basic:
                        $ref: '#/components/schemas/CertificateBasic'
                      content:
                        $ref: '#/components/schemas/CertificateContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Certificates]
      operationId: renewCertificate
      summary: Renew certificate (new pending version)
      description: |
        Creates a new pending version for renewal (old certificate remains active).  
        Returns 409 if a pending version already exists.
      responses:
        '201':
          description: New pending certificate created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateBasic'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

    patch:
      tags: [Certificates]
      operationId: updateCertificateStatus
      summary: Transition status (pending → active)
      description: |
        Activates pending certificate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusUpdateRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateBasic'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Certificates]
      operationId: revokeCertificate
      summary: Revoke certificate
      description: |
        Marks certificate as revoked. Optional reason.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevocationRequest'
      responses:
        '200':
          description: Certificate revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateBasic'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v2/certificates/{certId}/details:
    parameters:
      - $ref: '#/components/parameters/CertIdParam'
    get:
      tags: [Certificates]
      operationId: getCertificateDetails
      summary: Get Full Cert Info
      description: |
        Parsed details (subject, issuer, usages, algorithms, issuerChain).  
        ?fetchContent=true embeds content (cert, optional private/chain per include params).
      parameters:
        - $ref: '#/components/parameters/FetchContentParam'
        - $ref: '#/components/parameters/IncludePublicParam'
        - $ref: '#/components/parameters/IncludePrivateParam'
        - $ref: '#/components/parameters/IncludeChainParam'
      responses:
        '200':
          description: Full certificate details
          content:
            application/json:
              schema:
                type: object
                properties:
                  details:
                    $ref: '#/components/schemas/CertificateDetails'
                  content:
                    $ref: '#/components/schemas/CertificateContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v2/certificates/{certId}/content:
    parameters:
      - $ref: '#/components/parameters/CertIdParam'
    get:
      tags: [Certificates]
      operationId: getCertificateContent
      summary: Get PEM content only
      description: |
        PEM content (cert, optional private/chain per include params).  
        If includeChain=false, trustChainPem omitted.
      parameters:
        - $ref: '#/components/parameters/IncludePublicParam'
        - $ref: '#/components/parameters/IncludePrivateParam'
        - $ref: '#/components/parameters/IncludeChainParam'
      responses:
        '200':
          description: Certificate PEM content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v2/certificates/encryption:
    get:
      tags: [Encryption]
      operationId: listEncryptionCertificates
      summary: List encryption certificates by key
      description: |
        Matching encryption certificates for key query.
      parameters:
        - name: key
          in: query
          schema:
            type: string
            example: RTG/BAA/LILLIPUT/ORGID
      responses:
        '200':
          description: Matching encryption certificates (basic)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CertificateBasic'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v2/certificates/encryption/{key}:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Encryption]
      operationId: getEncryptionCertificate
      summary: Get encryption certificate by key
      description: |
        Encryption certificate for exact key.  
        ?fetchContent=true embeds content (cert, optional private/chain per include params).
      parameters:
        - $ref: '#/components/parameters/FetchContentParam'
        - $ref: '#/components/parameters/IncludePublicParam'
        - $ref: '#/components/parameters/IncludePrivateParam'
        - $ref: '#/components/parameters/IncludeChainParam'
      responses:
        '200':
          description: Encryption certificate
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CertificateBasic'
                  - type: object
                    properties:
                      basic:
                        $ref: '#/components/schemas/CertificateBasic'
                      content:
                        $ref: '#/components/schemas/CertificateContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # EST endpoints (RFC 7030)
  /.well-known/est/cacerts:
    get:
      tags: [EST]
      operationId: getCaCerts
      summary: Get CA certificates
      responses:
        '200':
          description: CA certificate chain
          content:
            application/pkix-cert:
              schema:
                type: string
                format: binary
            application/pkcs7-mime:
              schema:
                type: string
                format: binary

  /.well-known/est/simpleenroll:
    post:
      tags: [EST]
      operationId: simpleEnroll
      summary: Simple enrollment (new certificate)
      requestBody:
        required: true
        content:
          application/pkcs10:
            schema:
              type: string
              format: binary
          application/json:
            schema:
              type: object
              properties:
                csrPem:
                  type: string
                purpose:
                  type: string
                  enum: [identity, encryption, signing]
                recipient:
                  $ref: '#/components/schemas/Recipient'
              required: [csrPem, purpose]
      responses:
        '201':
          description: Certificate issued (active)
          content:
            application/pkix-cert:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateBasic'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /.well-known/est/simplereenroll:
    post:
      tags: [EST]
      operationId: simpleReenroll
      summary: Simple re-enrollment (renewal)
      requestBody:
        required: true
        content:
          application/pkcs10:
            schema:
              type: string
              format: binary
          application/json:
            schema:
              type: object
              properties:
                csrPem:
                  type: string
                purpose:
                  type: string
                  enum: [identity, encryption, signing]
                recipient:
                  $ref: '#/components/schemas/Recipient'
              required: [csrPem, purpose]
      responses:
        '201':
          description: Renewal certificate issued (pending)
          content:
            application/pkix-cert:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateBasic'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /v2/devices/gateways:
    post:
      tags: [Devices]
      operationId: registerGateway
      summary: Register a new gateway
      description: |
